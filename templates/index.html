<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小テスト作成</title>
    <style>
        :root {
            --bg: #f6f7f8;
            --surface: #ffffff;
            --surface-muted: #f1f3f5;
            --line: #d7dce1;
            --line-strong: #aeb7c2;
            --text: #202428;
            --muted: #65717d;
            --accent: #176b6f;
            --accent-dark: #0f5053;
            --danger: #b42318;
            --danger-bg: #fff0ed;
            --success-bg: #eaf7ef;
            --radius: 8px;
            --shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--text);
            background: var(--bg);
            font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
            font-size: 14px;
            line-height: 1.55;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            border: 0;
        }

        .app-shell {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 20px;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 20px;
        }

        .title-block h1 {
            margin: 0 0 6px;
            font-size: 24px;
            font-weight: 600;
            line-height: 1.35;
            letter-spacing: 0;
        }

        .title-block p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
        }

        .request-link {
            display: inline-flex;
            align-items: center;
            min-height: 40px;
            padding: 8px 12px;
            color: var(--accent);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            text-decoration: none;
            font-weight: 600;
            box-shadow: var(--shadow);
            white-space: nowrap;
        }

        .layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            align-items: start;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .panel-header {
            padding: 16px 18px 12px;
            border-bottom: 1px solid var(--line);
        }

        .panel-header h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.35;
            letter-spacing: 0;
        }

        .panel-header p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .panel-body {
            padding: 16px 18px 18px;
        }

        .field {
            display: grid;
            gap: 7px;
            margin-bottom: 16px;
        }

        .field:last-child {
            margin-bottom: 0;
        }

        label,
        .field-label {
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
        }

        select,
        input[type="date"],
        input[type="number"],
        input[type="text"] {
            width: 100%;
            min-height: 40px;
            padding: 8px 10px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--line-strong);
            border-radius: 6px;
        }

        select:focus,
        input[type="date"]:focus,
        input[type="number"]:focus,
        input[type="text"]:focus {
            outline: 3px solid rgba(23, 107, 111, 0.18);
            border-color: var(--accent);
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 8px 14px;
            color: #fff;
            background: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        .btn:hover {
            background: var(--accent-dark);
        }

        .btn:disabled {
            color: #919aa3;
            background: #e8ebee;
            cursor: not-allowed;
        }

        .btn-secondary {
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--line-strong);
        }

        .btn-secondary:hover {
            color: var(--text);
            background: var(--surface-muted);
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: #8f1d14;
        }

        .btn-compact {
            min-height: 34px;
            padding: 6px 10px;
            font-size: 13px;
        }

        .range-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .range-grid .field,
        .meta-grid .field {
            margin-bottom: 0;
        }

        .summary {
            display: none;
            margin-top: 16px;
            padding: 12px;
            color: var(--text);
            background: var(--surface-muted);
            border: 1px solid var(--line);
            border-radius: 6px;
            font-size: 13px;
        }

        .summary strong {
            display: block;
            margin-bottom: 3px;
            font-weight: 600;
        }

        .word-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .count-chip {
            min-width: 92px;
            padding: 6px 10px;
            background: var(--surface-muted);
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            white-space: nowrap;
        }

        .checkbox-container {
            height: 520px;
            max-height: calc(100vh - 220px);
            overflow-y: auto;
            overflow-x: hidden;
            contain: strict;
            padding: 10px;
            background: var(--surface-muted);
            border: 1px solid var(--line);
            border-radius: var(--radius);
        }

        .checkbox-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }

        .checkbox-item {
            min-width: 0;
            position: relative;
        }

        .checkbox-item input {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            margin: 0;
            opacity: 0;
            pointer-events: none;
        }

        .checkbox-item label {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px;
            align-items: center;
            min-height: 42px;
            padding: 8px 10px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 6px;
            cursor: pointer;
        }

        .checkbox-item label::before {
            content: "";
            width: 16px;
            height: 16px;
            border: 1px solid var(--line-strong);
            border-radius: 4px;
            background: #fff;
        }

        .checkbox-item input:checked + label {
            border-color: var(--accent);
            background: #edf8f8;
        }

        .checkbox-item input:checked + label::before {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: inset 0 0 0 3px #fff;
        }

        .checkbox-item input:focus-visible + label {
            outline: 3px solid rgba(23, 107, 111, 0.18);
        }

        .row-meta {
            min-width: 0;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .row-number {
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }

        .word-preview {
            min-width: 0;
            overflow: hidden;
            color: var(--text);
            font-weight: 600;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .generator-panel {
            margin-top: 20px;
        }

        .generator-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .loading {
            display: none;
            margin-top: 16px;
            color: var(--muted);
            font-size: 14px;
        }

        .error-message {
            display: none;
            margin-top: 16px;
            padding: 12px;
            color: var(--danger);
            background: var(--danger-bg);
            border: 1px solid #f2b8b1;
            border-radius: 6px;
            font-weight: 600;
        }

        .test-result,
        .test-format-2column,
        .answer-sheet-format {
            display: none;
            margin-top: 16px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .result-header,
        .test-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--line);
        }

        .result-header h3,
        .test-header h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.35;
            letter-spacing: 0;
        }

        .info,
        .book-name {
            margin-top: 4px;
            color: var(--muted);
            font-size: 13px;
        }

        .sheet-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 14px;
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
        }

        .test-content {
            padding: 6px 18px 14px;
        }

        .test-item {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) minmax(220px, 1.4fr);
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
        }

        .test-item:last-child {
            border-bottom: 0;
        }

        .question {
            font-weight: 600;
        }

        .answer {
            color: var(--muted);
        }

        .test-grid {
            padding: 14px 18px;
        }

        .test-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            background: #fff;
        }

        .test-table th,
        .test-table td {
            padding: 10px;
            border: 1px solid #9ca6b1;
            text-align: left;
            vertical-align: middle;
        }

        .test-table th {
            background: #edf0f2;
            font-weight: 600;
        }

        .test-table .number {
            width: 54px;
            text-align: center;
        }

        .test-table .word {
            width: 34%;
            font-weight: 600;
        }

        .test-table .answer {
            height: var(--answer-height, 70px);
            color: var(--text);
            background: #fff;
        }

        .answer-size-small {
            --answer-height: 48px;
        }

        .answer-size-medium {
            --answer-height: 70px;
        }

        .answer-size-large {
            --answer-height: 96px;
        }

        .answer-sheet-format .test-table .answer {
            background: var(--success-bg);
            font-weight: 600;
        }

        .print-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
            padding: 0;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .topbar,
            .result-header,
            .test-header {
                flex-direction: column;
                align-items: stretch;
            }

            .request-link {
                justify-content: center;
                white-space: normal;
            }
        }

        @media (max-width: 640px) {
            .app-shell {
                width: min(100% - 20px, 1180px);
                padding: 14px 0 16px;
            }

            .word-toolbar,
            .generator-actions,
            .print-controls {
                align-items: stretch;
                flex-direction: column;
            }

            .button-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            .range-grid,
            .meta-grid,
            .test-item {
                grid-template-columns: 1fr;
            }

            .checkbox-container {
                height: 440px;
                max-height: calc(100vh - 260px);
            }

            .btn {
                width: 100%;
            }
        }

        @media print {
            body {
                background: #fff;
            }

            body * {
                visibility: hidden;
            }

            .test-format-2column,
            .test-format-2column *,
            .answer-sheet-format,
            .answer-sheet-format * {
                visibility: visible;
            }

            .test-format-2column,
            .answer-sheet-format {
                position: absolute;
                inset: 0 auto auto 0;
                width: 100%;
                margin: 0;
                border: 0;
                box-shadow: none;
            }

            .print-controls {
                display: none;
            }

            .test-header {
                padding: 0 0 14px;
            }

            .test-grid {
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div class="title-block">
                <h1>小テスト作成</h1>
                <p>単語帳から、必要な分だけ印刷。</p>
            </div>
            <a class="request-link" href="/contact">単語帳を追加する</a>
        </header>

        <div class="layout">
            <aside>
                <section class="panel">
                    <div class="panel-header">
                        <h2>設定</h2>
                        <p>単語帳と出題範囲</p>
                    </div>
                    <div class="panel-body">
                        <div class="field">
                            <label for="fileSelect">単語帳</label>
                            <select id="fileSelect" onchange="loadSelectedFile()">
                                {% for file in available_files %}
                                <option value="{{ file.filename }}" {% if loop.first %}selected{% endif %}>{{ file.display_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="field">
                            <div class="field-label">用紙</div>
                            <div class="meta-grid">
                                <div class="field">
                                    <label for="testTitleInput">小テスト名</label>
                                    <input type="text" id="testTitleInput" placeholder="英単語テスト">
                                </div>
                                <div class="field">
                                    <label for="testDateInput">日付</label>
                                    <input type="date" id="testDateInput">
                                </div>
                            </div>
                        </div>

                        <div class="field">
                            <label for="questionModeSelect">出題方向</label>
                            <select id="questionModeSelect">
                                <option value="word-to-meaning" selected>英単語 → 意味</option>
                                <option value="meaning-to-word">意味 → 英単語</option>
                            </select>
                        </div>

                        <div class="field">
                            <label for="answerSizeSelect">解答欄</label>
                            <select id="answerSizeSelect">
                                <option value="small">狭め</option>
                                <option value="medium" selected>標準</option>
                                <option value="large">広め</option>
                            </select>
                        </div>

                        <div class="field">
                            <div class="field-label">まとめて選択</div>
                            <div class="button-row">
                                <button class="btn btn-secondary btn-compact" type="button" onclick="selectAll()">全選択</button>
                                <button class="btn btn-secondary btn-compact" type="button" onclick="deselectAll()">全解除</button>
                                <button class="btn btn-secondary btn-compact" type="button" onclick="selectRandom(30)">ランダム30</button>
                                <button class="btn btn-secondary btn-compact" type="button" onclick="selectRandom(50)">ランダム50</button>
                            </div>
                        </div>

                        <div class="field">
                            <div class="field-label">範囲指定</div>
                            <div class="range-grid">
                                <div class="field">
                                    <label for="randomStartRow">開始</label>
                                    <input type="number" id="randomStartRow" placeholder="1" min="1">
                                </div>
                                <div class="field">
                                    <label for="randomEndRow">終了</label>
                                    <input type="number" id="randomEndRow" placeholder="100" min="1">
                                </div>
                                <div class="field">
                                    <label for="randomCount">個数</label>
                                    <input type="number" id="randomCount" placeholder="10" min="1">
                                </div>
                            </div>
                            <div class="button-row">
                                <button class="btn btn-compact" type="button" onclick="selectRandomFromRange()">選択</button>
                                <button class="btn btn-secondary btn-compact" type="button" onclick="clearRandomInputs()">リセット</button>
                            </div>
                        </div>

                        <div class="summary" id="selectionSummary">
                            <strong>選択中</strong>
                            <span id="selectionText"></span>
                        </div>
                    </div>
                </section>

                <section class="panel generator-panel">
                    <div class="panel-header">
                        <h2>印刷準備</h2>
                        <p><span id="selectedCount">0</span>語を選択中</p>
                    </div>
                    <div class="panel-body">
                        <div class="generator-actions">
                            <button class="btn" type="button" onclick="generateTest()" id="generateBtn" disabled>作成</button>
                            <button class="btn btn-secondary" type="button" onclick="clearSelection()">選択解除</button>
                            <button class="btn btn-danger" type="button" onclick="printTest()" id="printBtn" disabled>印刷</button>
                        </div>
                        <div class="loading" id="loading">読み込み中...</div>
                        <div class="error-message" id="errorMessage"></div>
                    </div>
                </section>
            </aside>

            <section class="panel">
                <div class="panel-header">
                    <div class="word-toolbar">
                        <div>
                            <h2>単語一覧</h2>
                            <p>出題する単語にチェック</p>
                        </div>
                        <div class="count-chip"><span id="visibleWordCount">{{ data|length }}</span>語</div>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="checkbox-container" id="checkboxContainer">
                        <div class="checkbox-list">
                        {% for item in data %}
                        <div class="checkbox-item">
                            <input type="checkbox" id="row{{ item.row_number }}" value="{{ item.row_number }}" onchange="updateSelection()">
                            <label for="row{{ item.row_number }}">
                                <span class="row-meta">
                                    <span class="row-number">{{ item.row_number }}</span>
                                    <span class="word-preview">{{ item.word }}</span>
                                </span>
                            </label>
                        </div>
                        {% endfor %}
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <section class="test-result" id="testResult">
            <div class="result-header">
                <div>
                    <h3>確認</h3>
                    <div class="book-name" id="simpleTestBookName"></div>
                </div>
                <div class="button-row">
                    <button class="btn btn-secondary" type="button" onclick="show2ColumnTest()">問題用紙</button>
                    <button class="btn btn-secondary" type="button" onclick="showAnswerSheet()">解答用紙</button>
                </div>
            </div>
            <div class="test-content" id="testContent"></div>
        </section>

        <section class="test-format-2column" id="testFormat2Column">
            <div class="test-header">
                <div>
                    <h2 id="printTestTitle">英単語テスト</h2>
                    <div class="info">単語帳: <span id="testBookName"></span> ／ 出題数: <span id="testWordCount">0</span>語</div>
                    <div class="sheet-meta" id="testSheetMeta"></div>
                </div>
                <div class="print-controls">
                    <button class="btn" type="button" onclick="printTest()">印刷</button>
                    <button class="btn btn-secondary" type="button" onclick="showSimpleTest()">確認に戻る</button>
                </div>
            </div>
            <div class="test-grid" id="testGrid"></div>
        </section>

        <section class="answer-sheet-format" id="answerSheetFormat">
            <div class="test-header">
                <div>
                    <h2 id="answerSheetTitle">英単語テスト 解答用紙</h2>
                    <div class="info">単語帳: <span id="answerBookName"></span> ／ 出題数: <span id="answerWordCount">0</span>語</div>
                    <div class="sheet-meta" id="answerSheetMeta"></div>
                </div>
                <div class="print-controls">
                    <button class="btn" type="button" onclick="printAnswerSheet()">印刷</button>
                    <button class="btn btn-secondary" type="button" onclick="showSimpleTest()">確認に戻る</button>
                </div>
            </div>
            <div class="test-grid" id="answerGrid"></div>
        </section>
    </main>

    <script>
        let selectedRows = [];
        let shuffledTestData = [];

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;',
            })[char]);
        }

        function getWordCheckboxes() {
            return Array.from(document.querySelectorAll('#checkboxContainer input[type="checkbox"]'));
        }

        function getTestSettings() {
            const title = document.getElementById('testTitleInput').value.trim() || '英単語テスト';
            const date = document.getElementById('testDateInput').value;
            const questionMode = document.getElementById('questionModeSelect').value;
            const answerSize = document.getElementById('answerSizeSelect').value;
            const isReverse = questionMode === 'meaning-to-word';

            return {
                title,
                date,
                answerSize,
                isReverse,
                modeLabel: isReverse ? '意味 → 英単語' : '英単語 → 意味',
                promptHeader: isReverse ? '意味' : '英単語',
                answerHeader: isReverse ? '英単語' : '解答欄',
            };
        }

        function formatDateLabel(value) {
            if (!value) {
                return '';
            }

            const [year, month, day] = value.split('-');
            return year && month && day ? `${year}/${month}/${day}` : value;
        }

        function getPromptText(item, settings) {
            return settings.isReverse ? item.meaning : item.word;
        }

        function getAnswerText(item, settings) {
            return settings.isReverse ? item.word : item.meaning;
        }

        function applySheetSettings(settings, testDataLength) {
            const dateLabel = formatDateLabel(settings.date);
            const metaParts = [
                dateLabel ? `日付: ${escapeHtml(dateLabel)}` : '',
                `形式: ${escapeHtml(settings.modeLabel)}`,
            ].filter(Boolean);
            const metaHtml = metaParts.map((part) => `<span>${part}</span>`).join('');

            document.getElementById('printTestTitle').textContent = settings.title;
            document.getElementById('answerSheetTitle').textContent = `${settings.title} 解答用紙`;
            document.getElementById('testSheetMeta').innerHTML = metaHtml;
            document.getElementById('answerSheetMeta').innerHTML = metaHtml;
            document.getElementById('testWordCount').textContent = testDataLength;
            document.getElementById('answerWordCount').textContent = testDataLength;

            ['testFormat2Column', 'answerSheetFormat'].forEach((id) => {
                const element = document.getElementById(id);
                element.classList.remove('answer-size-small', 'answer-size-medium', 'answer-size-large');
                element.classList.add(`answer-size-${settings.answerSize}`);
            });
        }

        function shuffleItems(items) {
            const shuffled = [...items];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getPositiveIntegerInput(id) {
            const input = document.getElementById(id);
            if (!input) {
                return null;
            }

            const value = Number.parseInt(input.value, 10);
            return Number.isInteger(value) && value > 0 ? value : null;
        }

        function updateSelection() {
            const checkboxes = getWordCheckboxes().filter((checkbox) => checkbox.checked);
            selectedRows = checkboxes.map((checkbox) => Number.parseInt(checkbox.value, 10));

            const selectedCount = document.getElementById('selectedCount');
            const generateBtn = document.getElementById('generateBtn');
            const printBtn = document.getElementById('printBtn');
            const selectionSummary = document.getElementById('selectionSummary');
            const selectionText = document.getElementById('selectionText');

            selectedCount.textContent = selectedRows.length;
            generateBtn.disabled = selectedRows.length === 0;
            printBtn.disabled = selectedRows.length === 0 || shuffledTestData.length === 0;

            if (selectedRows.length > 0) {
                selectionSummary.style.display = 'block';
                selectionText.textContent = selectedRows.length > 20
                    ? `${selectedRows.slice(0, 20).join(', ')} ほか ${selectedRows.length - 20}語`
                    : selectedRows.join(', ');
            } else {
                selectionSummary.style.display = 'none';
            }
        }

        function selectAll() {
            getWordCheckboxes().forEach((checkbox) => {
                checkbox.checked = true;
            });
            updateSelection();
        }

        function deselectAll() {
            getWordCheckboxes().forEach((checkbox) => {
                checkbox.checked = false;
            });
            updateSelection();
        }

        function selectRandom(count) {
            deselectAll();
            shuffleItems(getWordCheckboxes()).slice(0, count).forEach((checkbox) => {
                checkbox.checked = true;
            });
            updateSelection();
        }

        function clearSelection() {
            deselectAll();
            shuffledTestData = [];
            document.getElementById('testResult').style.display = 'none';
            document.getElementById('testFormat2Column').style.display = 'none';
            document.getElementById('answerSheetFormat').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function generateTest() {
            if (selectedRows.length === 0) {
                showError('単語が選択されていません');
                return;
            }

            const loading = document.getElementById('loading');
            const testResult = document.getElementById('testResult');
            const errorMessage = document.getElementById('errorMessage');
            const selectedFile = document.getElementById('fileSelect').value;

            loading.style.display = 'block';
            testResult.style.display = 'none';
            errorMessage.style.display = 'none';

            fetch('/generate_test', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    selected_rows: selectedRows,
                    selected_file: selectedFile,
                }),
            })
                .then((response) => response.json())
                .then((data) => {
                    loading.style.display = 'none';

                    if (data.success) {
                        displayTest(data.test_data);
                    } else {
                        showError(data.error || 'テストの生成に失敗しました');
                    }
                })
                .catch((error) => {
                    loading.style.display = 'none';
                    showError('エラーが発生しました: ' + error.message);
                });
        }

        function displayTest(testData) {
            const testResult = document.getElementById('testResult');
            const testContent = document.getElementById('testContent');
            const fileSelect = document.getElementById('fileSelect');
            const bookName = fileSelect.options[fileSelect.selectedIndex].text;
            const settings = getTestSettings();

            document.getElementById('testBookName').textContent = bookName;
            document.getElementById('answerBookName').textContent = bookName;
            document.getElementById('simpleTestBookName').textContent = `単語帳: ${bookName}`;
            applySheetSettings(settings, testData.length);

            testContent.innerHTML = testData.map((item, index) => `
                <div class="test-item">
                    <div class="question">${index + 1}. ${escapeHtml(getPromptText(item, settings))}</div>
                    <div class="answer">${escapeHtml(getAnswerText(item, settings))}</div>
                </div>
            `).join('');

            testResult.style.display = 'block';
            document.getElementById('testFormat2Column').style.display = 'none';
            document.getElementById('answerSheetFormat').style.display = 'none';

            generate2ColumnTest(testData, settings);
            generateAnswerSheet(testData, settings);
            updateSelection();
        }

        function generate2ColumnTest(testData, settings) {
            const testGrid = document.getElementById('testGrid');
            shuffledTestData = shuffleItems(testData);

            testGrid.innerHTML = `
                <table class="test-table">
                    <thead>
                        <tr>
                            <th class="number">番号</th>
                            <th class="word">${escapeHtml(settings.promptHeader)}</th>
                            <th class="answer">${escapeHtml(settings.answerHeader)}</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${shuffledTestData.map((item, index) => `
                            <tr>
                                <td class="number">${index + 1}</td>
                                <td class="word">${escapeHtml(getPromptText(item, settings))}</td>
                                <td class="answer"></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function generateAnswerSheet(testData, settings) {
            const answerGrid = document.getElementById('answerGrid');
            const shuffledData = shuffledTestData.length > 0 ? shuffledTestData : shuffleItems(testData);

            answerGrid.innerHTML = `
                <table class="test-table">
                    <thead>
                        <tr>
                            <th class="number">番号</th>
                            <th class="word">${escapeHtml(settings.promptHeader)}</th>
                            <th class="answer">${escapeHtml(settings.isReverse ? '解答' : '解答')}</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${shuffledData.map((item, index) => `
                            <tr>
                                <td class="number">${index + 1}</td>
                                <td class="word">${escapeHtml(getPromptText(item, settings))}</td>
                                <td class="answer">${escapeHtml(getAnswerText(item, settings))}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function show2ColumnTest() {
            document.getElementById('testResult').style.display = 'none';
            document.getElementById('testFormat2Column').style.display = 'block';
            document.getElementById('answerSheetFormat').style.display = 'none';
        }

        function showAnswerSheet() {
            document.getElementById('testResult').style.display = 'none';
            document.getElementById('testFormat2Column').style.display = 'none';
            document.getElementById('answerSheetFormat').style.display = 'block';
        }

        function showSimpleTest() {
            document.getElementById('testResult').style.display = 'block';
            document.getElementById('testFormat2Column').style.display = 'none';
            document.getElementById('answerSheetFormat').style.display = 'none';
        }

        function printTest() {
            const testFormat2Column = document.getElementById('testFormat2Column');
            const answerSheetFormat = document.getElementById('answerSheetFormat');

            if (shuffledTestData.length === 0) {
                showError('先に問題を作成してください');
                return;
            }

            const originalTestDisplay = testFormat2Column.style.display;
            const originalAnswerDisplay = answerSheetFormat.style.display;

            testFormat2Column.style.display = 'block';
            answerSheetFormat.style.display = 'none';

            setTimeout(() => {
                window.print();
                testFormat2Column.style.display = originalTestDisplay;
                answerSheetFormat.style.display = originalAnswerDisplay;
            }, 100);
        }

        function printAnswerSheet() {
            const answerSheetFormat = document.getElementById('answerSheetFormat');
            const testFormat2Column = document.getElementById('testFormat2Column');
            const originalTestDisplay = testFormat2Column.style.display;
            const originalAnswerDisplay = answerSheetFormat.style.display;

            testFormat2Column.style.display = 'none';
            answerSheetFormat.style.display = 'block';

            setTimeout(() => {
                window.print();
                testFormat2Column.style.display = originalTestDisplay;
                answerSheetFormat.style.display = originalAnswerDisplay;
            }, 100);
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function selectRandomFromRange() {
            const startRow = getPositiveIntegerInput('randomStartRow');
            const endRow = getPositiveIntegerInput('randomEndRow');
            const count = getPositiveIntegerInput('randomCount');

            if (!startRow || !endRow || !count) {
                alert('開始、終了、個数を入力してください。');
                return;
            }

            if (startRow > endRow) {
                alert('開始は終了より小さい値にしてください。');
                return;
            }

            const availableRows = getWordCheckboxes().filter((checkbox) => {
                const rowNumber = Number.parseInt(checkbox.value, 10);
                return rowNumber >= startRow && rowNumber <= endRow;
            });

            if (availableRows.length === 0) {
                alert('指定された範囲に単語がありません');
                return;
            }

            if (count > availableRows.length) {
                alert(`指定範囲には${availableRows.length}語あります。${availableRows.length}語以下で指定してください。`);
                return;
            }

            deselectAll();
            shuffleItems(availableRows).slice(0, count).forEach((checkbox) => {
                checkbox.checked = true;
            });
            updateSelection();
        }

        function clearRandomInputs() {
            document.getElementById('randomStartRow').value = '';
            document.getElementById('randomEndRow').value = '';
            document.getElementById('randomCount').value = '';
        }

        function loadSelectedFile() {
            const fileSelect = document.getElementById('fileSelect');
            const selectedFile = fileSelect.value;

            if (!selectedFile) {
                showError('ファイルが選択されていません');
                return;
            }

            const loading = document.getElementById('loading');
            const checkboxContainer = document.getElementById('checkboxContainer');

            loading.style.display = 'block';
            checkboxContainer.innerHTML = '';

            fetch('/load_file', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    filename: selectedFile,
                }),
            })
                .then((response) => response.json())
                .then((data) => {
                    loading.style.display = 'none';

                    if (data.success) {
                        displayWordList(data.data);
                        clearSelection();
                    } else {
                        showError(data.error || 'ファイルの読み込みに失敗しました');
                    }
                })
                .catch((error) => {
                    loading.style.display = 'none';
                    showError('エラーが発生しました: ' + error.message);
                });
        }

        function displayWordList(data) {
            const checkboxContainer = document.getElementById('checkboxContainer');
            const visibleWordCount = document.getElementById('visibleWordCount');

            checkboxContainer.innerHTML = `
                <div class="checkbox-list">
                    ${data.map((item) => `
                        <div class="checkbox-item">
                            <input type="checkbox" id="row${item.row_number}" value="${item.row_number}" onchange="updateSelection()">
                            <label for="row${item.row_number}">
                                <span class="row-meta">
                                    <span class="row-number">${item.row_number}</span>
                                    <span class="word-preview">${item.word}</span>
                                </span>
                            </label>
                        </div>
                    `).join('')}
                </div>
            `;

            visibleWordCount.textContent = data.length;
            updateSelection();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('testDateInput');
            if (dateInput && !dateInput.value) {
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                dateInput.value = now.toISOString().slice(0, 10);
            }
            updateSelection();
        });
    </script>
</body>
</html>
